name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_image_tag:
        description: 'Redeploy a specific image tag (skips build). Leave blank to build from HEAD.'
        type: string
        required: false
        default: ''
      skip_terraform:
        description: 'Skip Terraform apply (use when infra is already provisioned)'
        type: boolean
        required: false
        default: false
      environment:
        description: 'Target environment'
        type: choice
        required: false
        default: prod
        options: [prod]

env:
  AWS_REGION: ap-south-1
  PROJECT: hello-world
  ENVIRONMENT: prod
  CLUSTER_NAME: hello-world-prod
  ECR_REPOSITORY: hello-world
  TF_DIR: terraform/environments/prod

permissions:
  id-token: write   # OIDC for AWS auth
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Security Gates
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for Gitleaks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        continue-on-error: false

      - name: Gitleaks — scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bandit — Python SAST
        run: |
          pip install bandit
          bandit -r app/ -ll -x app/tests || true

      - name: Checkov — IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_130

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm lint
        run: helm lint helm/hello-world/

      - name: Hadolint — Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Build & Push
# Skipped when force_image_tag is provided (re-deploying existing image)
# ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: security-gates
    if: |
      needs.security-gates.result == 'success' &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && inputs.force_image_tag == '')
      )
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} \
            app/

      - name: Trivy — vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Terraform
# Skipped when skip_terraform=true (re-deploy without infra changes)
# ─────────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    needs: [security-gates, build-and-push]
    if: |
      always() &&
      needs.security-gates.result == 'success' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || !inputs.skip_terraform)
    outputs:
      ecr-url: ${{ steps.tf-outputs.outputs.ecr_url }}
      irsa-role-arn: ${{ steps.tf-outputs.outputs.irsa_role_arn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "irsa_role_arn=$(terraform output -raw hello_world_irsa_role_arn)" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Deploy (canary → stable)
# Runs even when build or terraform were skipped (workflow_dispatch fast-path)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [security-gates, build-and-push, terraform]
    if: |
      always() &&
      needs.security-gates.result == 'success' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # When build/terraform are skipped, resolve image tag and ECR URL from AWS
      - name: Resolve image tag and ECR URL
        id: resolve
        run: |
          if [[ -n "${{ inputs.force_image_tag }}" ]]; then
            echo "image_tag=${{ inputs.force_image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ needs.build-and-push.outputs.image-tag }}" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ needs.terraform.result }}" == "success" ]]; then
            echo "ecr_url=${{ needs.terraform.outputs.ecr-url }}" >> "$GITHUB_OUTPUT"
            echo "irsa_arn=${{ needs.terraform.outputs.irsa-role-arn }}" >> "$GITHUB_OUTPUT"
          else
            ECR_URL=$(aws ecr describe-repositories \
              --repository-names "${{ env.ECR_REPOSITORY }}" \
              --query 'repositories[0].repositoryUri' --output text)
            echo "ecr_url=${ECR_URL}" >> "$GITHUB_OUTPUT"
            IRSA_ARN=$(aws iam list-roles \
              --query "Roles[?contains(RoleName, \`${{ env.CLUSTER_NAME }}-hello-world-irsa\`)].Arn | [0]" \
              --output text)
            echo "irsa_arn=${IRSA_ARN}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      # ── Canary deploy (20% traffic) ──────────────────────────────────────────
      - name: Deploy canary (20% traffic)
        run: |
          helm upgrade --install hello-world-canary helm/hello-world/ \
            --namespace hello-world \
            --set image.repository=${{ steps.resolve.outputs.ecr_url }} \
            --set image.tag=${{ steps.resolve.outputs.image_tag }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${{ steps.resolve.outputs.irsa_arn }}" \
            --set replicaCount=1 \
            --set ingress.annotations."nginx\.ingress\.kubernetes\.io/canary"="true" \
            --set ingress.annotations."nginx\.ingress\.kubernetes\.io/canary-weight"="20" \
            --set canary.enabled=true \
            --set canary.weight=20 \
            --set canary.image.tag=${{ steps.resolve.outputs.image_tag }} \
            --wait \
            --timeout 3m

      # ── Health check (60 seconds) ────────────────────────────────────────────
      - name: Health check — monitor canary for 60s
        run: |
          echo "Monitoring canary for 60 seconds..."
          sleep 60
          READY=$(kubectl get pods -n hello-world \
            -l app=hello-world-canary \
            -o jsonpath='{.items[*].status.containerStatuses[0].ready}')
          for status in $READY; do
            if [ "$status" != "true" ]; then
              echo "Canary pod not ready — rolling back"
              helm rollback hello-world-canary -n hello-world || true
              helm uninstall hello-world-canary -n hello-world || true
              exit 1
            fi
          done
          RESTARTS=$(kubectl get pods -n hello-world \
            -l app=hello-world-canary \
            -o jsonpath='{.items[*].status.containerStatuses[0].restartCount}')
          for count in $RESTARTS; do
            if [ "$count" -gt 2 ]; then
              echo "Canary pod restarting too often ($count restarts) — rolling back"
              helm uninstall hello-world-canary -n hello-world || true
              exit 1
            fi
          done
          echo "Canary healthy — proceeding to stable promotion"

      # ── Promote to stable (100% traffic) ────────────────────────────────────
      - name: Promote to stable (100% traffic)
        run: |
          helm upgrade --install hello-world helm/hello-world/ \
            --namespace hello-world \
            --set image.repository=${{ steps.resolve.outputs.ecr_url }} \
            --set image.tag=${{ steps.resolve.outputs.image_tag }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${{ steps.resolve.outputs.irsa_arn }}" \
            --set ingress.annotations."nginx\.ingress\.kubernetes\.io/canary"="false" \
            --wait \
            --timeout 5m

      # ── Remove canary ────────────────────────────────────────────────────────
      - name: Remove canary release
        run: helm uninstall hello-world-canary --namespace hello-world

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ steps.resolve.outputs.ecr_url }}:${{ steps.resolve.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: \`${{ env.CLUSTER_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace**: \`hello-world\`" >> $GITHUB_STEP_SUMMARY
          kubectl rollout status deployment/hello-world -n hello-world
