---
# ── ExternalSecret: Grafana ───────────────────────────────────────────────────
# ESO pulls from AWS Secrets Manager → creates K8s secret
# Grafana Helm chart reads the K8s secret via existingSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-secret
  namespace: monitoring
spec:
  refreshInterval: 1h      # re-sync every hour (picks up rotations)
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials    # K8s secret name created by ESO
    creationPolicy: Owner              # ESO owns this secret lifecycle
    template:
      type: Opaque
  data:
    - secretKey: admin-user            # key in K8s secret
      remoteRef:
        key: hello-world/prod/grafana  # AWS Secrets Manager path
        property: admin-user           # JSON field inside the secret
    - secretKey: admin-password
      remoteRef:
        key: hello-world/prod/grafana
        property: admin-password

---
# ── ExternalSecret: Let's Encrypt email ───────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: letsencrypt-secret
  namespace: cert-manager
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: letsencrypt-config
    creationPolicy: Owner
  data:
    - secretKey: email
      remoteRef:
        key: hello-world/prod/letsencrypt
        property: email

---
# ── ExternalSecret: App secrets ───────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hello-world-secret
  namespace: hello-world
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: hello-world-app-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: secret-key
      remoteRef:
        key: hello-world/prod/app
        property: secret-key
