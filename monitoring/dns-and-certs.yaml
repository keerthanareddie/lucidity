---
# ── DNS + HTTPS Setup ─────────────────────────────────────────────────────────
#
# OPTION 1: nip.io — Zero setup, works immediately
# ─────────────────────────────────────────────────
# nip.io is a magic DNS service.
# Any IP embedded in the domain resolves to that IP.
#
# Steps:
#   1. Get ALB IP after ingress-nginx deploys:
#      kubectl get svc ingress-nginx-controller -n ingress-nginx
#      → EXTERNAL-IP: 54.123.45.67
#
#   2. Your domain is: hello-world.54.123.45.67.nip.io
#      No DNS config needed — just works!
#
#   3. Update helm values.yaml:
#      ingress.hosts[0].host: hello-world.54.123.45.67.nip.io
#      ingress.tls[0].hosts[0]: hello-world.54.123.45.67.nip.io
#
#   LIMITATION: Let's Encrypt rate-limits nip.io subdomains.
#   Use letsencrypt STAGING issuer for testing, prod for final submission.
#
# OPTION 2: DuckDNS — Free persistent subdomain (RECOMMENDED)
# ────────────────────────────────────────────────────────────
# Steps:
#   1. Go to https://duckdns.org → sign in with GitHub
#   2. Create domain: hello-world-eks (gives hello-world-eks.duckdns.org)
#   3. Get your DuckDNS token from the dashboard
#   4. Run the update script (see below) OR use their API:
#      curl "https://www.duckdns.org/update?domains=hello-world-eks&token=YOUR_TOKEN&ip=54.123.45.67"
#   5. Update helm values with hello-world-eks.duckdns.org
#
# OPTION 3: Cloudflare (Free tier) — Best for production demo
# ────────────────────────────────────────────────────────────
# Cloudflare gives free DNS management for any domain.
# Freenom gives free .tk/.ml domains.
# Together = real production-looking setup for free.
#
# Steps:
#   1. Get a free domain from https://freenom.com (.tk or .ml)
#   2. Sign up at https://cloudflare.com (free)
#   3. Add your domain to Cloudflare
#   4. Change nameservers at Freenom to Cloudflare's NS
#   5. Add A record: @ → ALB IP
#   6. Add A record: hello-world → ALB IP
#   7. cert-manager gets Let's Encrypt cert via HTTP-01 challenge
#
# External DNS (auto-manages Route53/Cloudflare from K8s)
# ────────────────────────────────────────────────────────
# For real automation, ExternalDNS watches Ingress resources
# and automatically creates DNS records.
# We include it below configured for Cloudflare.

---
# ── cert-manager: Staging ClusterIssuer (for testing) ────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Email read from K8s secret synced by External Secrets Operator
    email: "REPLACE_WITH_YOUR_EMAIL"
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---
# ── cert-manager: Production ClusterIssuer ────────────────────────────────────
# Use this for final submission — gives real trusted certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "REPLACE_WITH_YOUR_EMAIL"   # from AWS Secrets Manager via ESO
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      # HTTP-01 challenge — cert-manager creates a temporary HTTP endpoint
      # Let's Encrypt hits it to verify you own the domain
      - http01:
          ingress:
            ingressClassName: nginx
            podTemplate:
              spec:
                nodeSelector:
                  kubernetes.io/os: linux

---
# ── ExternalDNS for Cloudflare (optional — auto DNS management) ───────────────
# Watches Ingress resources and creates DNS records automatically.
# Requires Cloudflare API token stored in Secrets Manager.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.14.0
          args:
            - --source=ingress
            - --provider=cloudflare
            - --cloudflare-proxied=false    # direct traffic, not via Cloudflare CDN
            - --domain-filter=yourdomain.tk # your domain
            - --policy=upsert-only          # never delete DNS records
            - --log-level=info
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token   # synced by ESO from Secrets Manager
                  key: token
